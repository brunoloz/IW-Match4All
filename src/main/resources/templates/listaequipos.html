<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Listado de Equipos</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container mt-3">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <div class="container mb-5 mt-4">
            
            <div class="row align-items-center mb-4">
                <div class="col-md-8">
                    <h1 class="display-5 fw-bold" style="color: var(--brand-blue);">Equipos Disponibles</h1>
                    <p class="text-muted">Explora los equipos registrados.</p>
                </div>
                <div class="col-md-5 text-end">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchEquipos" class="form-control border-start-0" placeholder="Buscar equipos por nombre...">
                    </div>
                </div>
                <div class="col-md-4 text-md-end">
                    <span class="badge badge-custom" style="background-color: var(--brand-blue); color: white;" th:text="${equipos.size() + ' equipos encontrados'}">0 equipos</span>
                </div>
            </div>

            <hr class="my-4">

            <!-- equipos en tarjetas -->
            <div class="row">
                <div class="col-12">
                    <th:block th:if="${!equipos.isEmpty()}">
                        <div th:each="e : ${equipos}" class="competicion-card hover-lift">
                            <!-- Escudo del equipo -->
                            <div class="competicion-image">
                                <img th:src="@{'/img/' + ${e.escudo}}" 
                                     alt="Escudo" 
                                     onerror="this.src='/img/default-team-shield.png';" 
                                     style="width: 100%; height: 100%; object-fit: contain; padding: 10px;">
                            </div>

                            <!-- Contenido -->
                            <div class="competicion-content">
                                <!-- Encabezado -->
                                <div class="competicion-header">
                                    <h2 class="competicion-title" th:text="${e.nombre}">Nombre de Equipo</h2>
                                </div>

                                <!-- Información -->
                                <div class="competicion-info">
                                    <!-- Tipo/Modalidad -->
                                    <div class="info-item">
                                        <i class="bi bi-bookmark-fill"></i>
                                        <div class="info-item-content">
                                            <span class="info-label">Descripción</span>
                                            <span class="info-value" th:text="${e.descripcion}"></span>
                                        </div>
                                    </div>

                                    <!-- Capacidad -->
                                    <div class="info-item">
                                        <i class="bi bi-people-fill"></i>
                                        <div class="info-item-content">
                                            <span class="info-label">Número de jugadores</span>
                                            <span class="info-value" th:text="${e.jugadores.size() + ' jugadores'}">0 jugadores</span>
                                        </div>
                                    </div>

                                    <!-- Estado -->
                                    <div class="info-item">
                                        <div class="info-item-content">
                                            <span class="info-label">Ubicación</span>
                                            <span class="info-value" th:text="${e.ubicacion}"></span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Botones de acción -->
                                <div class="competicion-footer">
                                    <a th:href="@{/gestionequipo/{id}(id=${e.id})}" class="btn btn-outline-secondary btn-sm" style="text-decoration:none; display:inline-flex; align-items:center; padding: 0.5rem 1rem; border-radius: 6px;">
                                        <i class="bi bi-eye me-2"></i>Ver Detalles
                                    </a>

                                    <form th:action="@{/equipo/solicitar}" method="post" class="m-0">
                                        <input type="hidden" name="idEquipo" th:value="${e.id}">
                                        
                                        <button type="submit" class="btn-brand-blue" style="border: none; cursor: pointer; display: inline-flex; align-items: center;">
                                            <i class="bi bi-arrow-right me-2"></i>Solicitar inscripción
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </th:block>

                    <!-- Estado vacío -->
                    <th:block th:if="${equipos.isEmpty()}">
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <h4>No hay equipos disponibles</h4>
                            <p class="text-muted mb-0">No hay equipos registrados en el sistema en este momento.</p>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchEquipos');
            const equipoCards = document.querySelectorAll('.competicion-card');
            const badgeCount = document.querySelector('.badge-custom');
            
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                let visibleCount = 0;
                
                equipoCards.forEach(card => {
                    const equipoTitle = card.querySelector('.competicion-title').textContent.toLowerCase();
                    const isVisible = equipoTitle.includes(searchTerm);
                    
                    card.style.display = isVisible ? 'flex' : 'none';
                    if (isVisible) visibleCount++;
                });
                
                // Actualizar el contador de equipos
                badgeCount.textContent = visibleCount + ' equipo' + (visibleCount !== 1 ? 's' : '') + ' encontrado' + (visibleCount !== 1 ? 's' : '');
            });
        });
    </script>
</body>
</html>
