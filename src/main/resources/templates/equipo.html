<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<th:block th:replace="~{fragments/head :: header}" />
	<title>Gestión del Equipo</title>
</head>

<body>
	<header th:replace="~{fragments/nav.html :: nav}"></header>

	<main class="container py-4">
		<div class="row mb-3">
			<div class="col-12">
				<div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
					<i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				</div>
				<div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
					<i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				</div>
			</div>
		</div>

		<div class="row g-3 align-items-start">
			<section class="col-12 col-lg-8">
				<div class="card shadow-sm">
					<div class="card-header">
						<h2 class="h5 mb-0">Plantilla</h2>
					</div>
					<div class="card-body p-0">
						<div class="table-responsive">
							<table id="player-table" class="table table-hover align-middle mb-0">
								<thead class="table-light">
									<tr>
										<th>Jugador</th>
										<th>Posición</th>
										<th>Goles</th>
										<th>Asistencias</th>
										<th class="text-end" style="width: 56px;"></th>
									</tr>
								</thead>
								<tbody id="player-list">
									<tr th:each="jugador : ${equipo != null ? equipo.jugadores : {}}">
										<td>
											<div class="d-flex align-items-center gap-2">
												<a th:href="@{/user/{id}(id=${jugador.id})}" class="d-flex align-items-center gap-2 link-primary" style="text-decoration:none;">
													<img th:src="@{'/img/' + ${jugador.avatar}}" 
														 alt="Jugador" 
														 class="rounded-circle" 
														 width="28" 
														 height="28"
														 onerror="this.src='/img/default-avatar.png';">
													<span class="fw-semibold" th:text="${jugador.firstName} + ' ' + ${jugador.lastName}"></span>
												</a>
											</div>
										</td>
										<td th:text="${jugador.posicion}"></td>
										<td th:text="${jugador.goles}"></td>
										<td th:text="${jugador.asistencias}"></td>
										<td class="text-end" style="width: 56px;">
											<form th:if="${session.u != null and equipo.capitan != null and session.u.id == equipo.capitan.id and jugador.id != session.u.id}" 
												th:action="@{/equipo/expulsar}" method="post" class="m-0"
												onsubmit="return confirm('¿Estás seguro de que quieres expulsar a este jugador de la plantilla?');">
												<input type="hidden" name="idUsuario" th:value="${jugador.id}">
												<button type="submit" class="btn btn-sm btn-outline-danger" title="Expulsar jugador">
													Quitar
												</button>
											</form>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</section>

			<section class="col-12 col-lg-4 d-flex flex-column gap-3">
				<div class="card shadow-sm">
					<div class="card-body">
						<div class="d-flex align-items-center gap-3 mb-3">
							<img th:if="${equipo != null}" 
								 th:src="@{'/img/equipos/' + ${equipo.escudo}}"
								 src="/img/default-team.png" 
								 alt="Escudo del equipo" 
								 class="rounded" 
								 width="72" 
								 height="72"
								 onerror="this.src='/img/default-team.png';">
							<img th:if="${equipo == null}" 
								 src="/img/default-team.png" 
								 alt="Escudo del equipo" 
								 class="rounded" 
								 width="72" 
								 height="72">
							<div>
								<h2 class="h5 mb-0" th:text="${equipo != null ? equipo.nombre : 'Sin equipo'}"></h2>
								<p class="mb-0 text-muted" th:text="${equipo != null ? equipo.ubicacion : 'No disponible'}"></p>
							</div>
						</div>

						<div class="row g-2 text-center">
							<div class="col-4">
								<div class="border rounded p-2">
									<div class="fw-bold" th:text="${equipo != null ? equipo.jugadores.size() : 0}">0</div>
									<small class="text-muted">Jugadores</small>
								</div>
							</div>
							<div class="col-4">
								<div class="border rounded p-2">
									<div class="fw-bold">0</div>
									<small class="text-muted">Goles</small>
								</div>
							</div>
							<div class="col-4">
								<div class="border rounded p-2">
									<div class="fw-bold">0</div>
									<small class="text-muted">Victorias</small>
								</div>
							</div>
						</div>

						<div th:if="${equipo != null && u != null && u.id == equipo.capitan.id}" class="mt-3">
							<span class="badge text-bg-primary">Eres el capitán</span>
						</div>
					</div>
				</div>

				<div class="card shadow-sm">
					<div class="card-header">
						<h3 class="h6 mb-0">Competiciones en juego</h3>
					</div>
					<ul class="list-group list-group-flush" th:if="${competicionesEquipo != null && !competicionesEquipo.isEmpty()}">
						<li th:each="comp : ${competicionesEquipo}" class="list-group-item d-flex justify-content-between align-items-center">
							<div>
								<span class="fw-semibold" th:text="${comp.nombre}">Nombre competición</span>
							</div>
						</li>
					</ul>
					<div class="card-body text-center text-muted" th:if="${competicionesEquipo == null || competicionesEquipo.isEmpty()}">
						<small>No estás inscrito en ninguna competición.</small>
					</div>
				</div>

				<div id="admin-panel" th:if="${equipo != null && u != null && equipo.capitan != null && u.id == equipo.capitan.id}" class="card shadow-sm border-success">
					<div class="card-header bg-success text-white">
						<h3 class="h6 mb-0">Solicitudes de Ingreso</h3>
					</div>
					<div class="card-body p-0">
						<div th:if="${equipo.solicitantes == null || equipo.solicitantes.isEmpty()}" class="p-3 text-center text-muted">
							<small>No hay solicitudes pendientes.</small>
						</div>
						<ul class="list-group list-group-flush" th:if="${equipo.solicitantes != null && !equipo.solicitantes.isEmpty()}">
							<li th:each="solicitante : ${equipo.solicitantes}" class="list-group-item d-flex justify-content-between align-items-center">
								<div>
									<span class="fw-bold" th:text="${solicitante.firstName} + ' ' + ${solicitante.lastName}">Jugador</span>
									<span class="badge bg-secondary ms-1" th:text="${solicitante.posicion != null ? solicitante.posicion : 'Sin pos.'}">Posición</span>
								</div>
								<div class="d-flex gap-2 m-0">
									<form th:action="@{/equipo/aceptar}" method="post" class="m-0">
										<input type="hidden" name="idUsuario" th:value="${solicitante.id}">
										<button type="submit" class="btn btn-sm btn-success" title="Aceptar en el equipo">
											<i class="bi bi-check-lg"></i> Aceptar
										</button>
									</form>
									<form th:action="@{/equipo/rechazar}" method="post" class="m-0">
										<input type="hidden" name="idUsuario" th:value="${solicitante.id}">
										<button type="submit" class="btn btn-sm btn-outline-danger" title="Rechazar solicitud">
											<i class="bi bi-x-lg"></i> Rechazar
										</button>
									</form>
								</div>
							</li>
						</ul>
					</div>
				</div>
			</section>
		</div>
	</main>

	<th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
